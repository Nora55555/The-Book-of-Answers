<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#050202">
  <meta name="description" content="答案之书 - 探索命运的神秘启示">
  <title>答案之书</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=Playfair+Display+SC:wght@400;500;600;700;800;900&family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="bg-void"></div>
  <canvas id="bg-canvas"></canvas>
  <canvas id="light-beam-canvas"></canvas>
  <canvas id="star-dust-canvas"></canvas>
  <div class="bg-grain"></div>

  <div class="app">
    <div class="header-canvas-container">
      <canvas id="header-canvas"></canvas>
    </div>

    <div class="input-canvas-container">
      <canvas id="input-canvas"></canvas>
      <input type="text" id="question-input" placeholder="" maxlength="30" autocomplete="off">
    </div>

    <div class="book-container">
      <div class="book-wrapper">
        <div class="book-3d" id="book-3d">
          <div class="book-left">
            <canvas id="cover-canvas"></canvas>
            <div class="cover-overlay" id="cover-overlay">
              <div class="cover-center">
                <div class="cover-symbol" id="cover-symbol">
                  <div class="symbol-glow"></div>
                  <div class="symbol-icon">✧</div>
                </div>
                <div class="hold-progress-ring" id="hold-progress-ring">
                  <svg viewBox="0 0 120 120">
                    <circle cx="60" cy="60" r="56" fill="none" stroke="rgba(255, 220, 150, 0.25)" stroke-width="2.5"/>
                    <circle cx="60" cy="60" r="56" fill="none" stroke="url(#progress-gradient)" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="352" stroke-dashoffset="352" class="progress-bar"/>
                    <defs>
                      <linearGradient id="progress-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" style="stop-color:#FFE696"/>
                        <stop offset="50%" style="stop-color:#FFD36B"/>
                        <stop offset="100%" style="stop-color:#FFE696"/>
                      </linearGradient>
                    </defs>
                  </svg>
                </div>
              </div>
              <div class="cover-subtitle">BOOK OF ANSWERS</div>
              <div class="cover-hint">长按启封</div>
            </div>
          </div>

          <div class="book-spine">
            <div class="spine-line"></div>
            <div class="spine-glow"></div>
          </div>

          <div class="book-right">
            <canvas id="page-canvas"></canvas>
            <div class="page-overlay" id="page-overlay">
              <div class="page-content-wrapper">
                <div class="page-top">
                  <div class="page-number">01</div>
                  <div class="page-decoration">✧ ✧ ✧</div>
                </div>

                <div class="answer-section" id="answer-section">
                  <div class="answer-initial" id="answer-initial"></div>
                  <div class="answer-text" id="answer-text"></div>
                  <div class="answer-explanation" id="answer-explanation"></div>
                </div>

                <div class="page-bottom">
                  <div class="page-quote">The future is in your hands</div>
                  <div class="page-signature">— Answers</div>
                </div>
              </div>
            </div>
          </div>

          <div class="book-shadow"></div>
        </div>
      </div>
    </div>

    <div class="actions" id="actions">
      <button class="action-btn" id="btn-refresh">
        <span class="btn-icon">↻</span>
        <span class="btn-text">再问一次</span>
      </button>
      <button class="action-btn primary" id="btn-share">
        <span class="btn-icon">✧</span>
        <span class="btn-text">保存答案</span>
      </button>
      <button class="action-btn" id="btn-history">
        <span class="btn-icon">📜</span>
        <span class="btn-text">历史</span>
      </button>
    </div>
  </div>

  <div class="history-modal" id="history-modal">
    <div class="modal-bg"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2>历史答案</h2>
        <button class="modal-close" id="modal-close">×</button>
      </div>
      <div class="history-list" id="history-list"></div>
    </div>
  </div>

  <div class="share-modal" id="share-modal">
    <div class="modal-bg"></div>
    <div class="share-content">
      <div class="share-header">
        <h2>保存你的答案</h2>
        <button class="modal-close" id="share-close">×</button>
      </div>
      <div class="share-card-container">
        <canvas id="share-canvas"></canvas>
      </div>
      <div class="share-actions">
        <button class="share-btn" id="btn-save-image">
          <span class="btn-icon">📷</span>
          <span class="btn-text">保存图片</span>
        </button>
        <button class="share-btn primary" id="btn-copy-link">
          <span class="btn-icon">🔗</span>
          <span class="btn-text">复制文案</span>
        </button>
      </div>
    </div>
  </div>

  <script src="js/answers.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
